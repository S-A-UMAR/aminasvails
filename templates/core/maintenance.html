<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salon Under Maintenance - Amina's Vails</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;600&family=Roboto:wght@300&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0D0D0D;
            color: #FFFFFF;
            font-family: 'Roboto', sans-serif;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .maintenance-container {
            max-width: 600px;
            padding: 40px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            background-color: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
        }
        h1 {
            font-family: 'Josefin Sans', sans-serif;
            font-size: 2.5rem;
            color: #D4AF37;
            letter-spacing: 3px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #CCCCCC;
            margin-bottom: 30px;
        }
        .footer-logo {
            font-family: 'Josefin Sans', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: #888888;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="maintenance-container">
        <h1>Salon Under Maintenance</h1>
        <p>
            Our online boutique is currently undergoing scheduled enhancements to elevate your shopping experience. We will return shortly with our latest collections of luxury veils. Thank you for your patience.
        </p>
        <div class="footer-logo">Amina's Vails</div>
    </div>
</body>
</html>
